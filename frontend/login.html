<!DOCTYPE html>
<!-- Purpose: Renders the login page for the Career Catalyst frontend. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Catalyst | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex justify-center items-center min-h-screen px-4 overflow-x-hidden">

  <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-8 space-y-6 border border-gray-100">

   <div class="flex justify-center mb-4">
      <img src="./assets/CareerCatalyst.png"alt="Career Catalyst Logo" class="w-48 h-auto">
    </div>


    <p class="text-center text-gray-500 mb-6">
      Access your account and continue your career journey 🚀
    </p>

    <!-- Role Selection -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">I am a *</label>
      <div class="grid grid-cols-2 gap-4">
        <!-- Candidate -->
        <button id="candidateBtn" type="button"
          class="role-btn flex flex-col items-center justify-center border border-gray-300 rounded-xl py-4 hover:border-indigo-500 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 mb-2 text-indigo-600" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
          </svg>
          <span class="font-medium text-gray-700">Candidate</span>
        </button>

        <!-- Recruiter -->
        <button id="recruiterBtn" type="button"
          class="role-btn flex flex-col items-center justify-center border border-gray-300 rounded-xl py-4 hover:border-indigo-500 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 mb-2 text-indigo-600" fill="currentColor" viewBox="0 0 24 24">
            <path d="M3 3v18h18V3H3zm2 2h14v14H5V5zm2 2v2h2V7H7zm0 4v2h2v-2H7zm0 4v2h2v-2H7zm4-8v2h2V7h-2zm0 4v2h2v-2h-2zm0 4v2h2v-2h-2zm4-8v2h2V7h-2zm0 4v2h2v-2h-2zm0 4v2h2v-2h-2z"/>
          </svg>
          <span class="font-medium text-gray-700">Recruiter</span>
        </button>
      </div>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-4 mt-4">
      <input type="text" id="fullName" placeholder="Full Name"
        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none" required>
      <input type="email" id="email" placeholder="Email Address"
        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none" required>
      <input type="password" id="password" placeholder="Password"
        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none" required>

      <!-- Status Message -->
      <p id="statusMsg" class="text-center text-sm font-medium hidden"></p>

      <button type="submit" id="loginBtn"
        class="w-full bg-gradient-to-r from-indigo-500 to-blue-600 hover:from-blue-600 hover:to-indigo-500 text-white font-semibold py-3 rounded-lg shadow-md transition">
        Login
      </button>

      <div class="flex justify-between items-center text-sm text-indigo-600 mt-2">
        <a href="#" id="forgotPasswordLink" class="hover:underline">Forgot Password?</a>
        <a href="role.html" class="hover:underline">Sign Up</a>
      </div>
    </form>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgotPasswordModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-6 relative">
      <h2 class="text-xl font-semibold text-gray-800 mb-3">Reset Password</h2>
      <p class="text-sm text-gray-500 mb-4">Enter your email and we’ll send you a reset link.</p>
      <input type="email" id="resetEmail" placeholder="Enter your email"
        class="w-full p-3 border border-gray-300 rounded-lg mb-3 focus:ring-2 focus:ring-indigo-400 focus:outline-none">
      <p id="resetMsg" class="text-center text-sm font-medium hidden"></p>
      <a id="resetLink" href="#" class="hidden block text-center text-sm text-indigo-600 hover:underline break-all mb-3" target="_self"></a>
      <div class="flex justify-end gap-2">
        <button id="cancelReset" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">Cancel</button>
        <button id="sendReset" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Send</button>
      </div>
    </div>
  </div>

  <script>
    let selectedRole = null;
    const candidateBtn = document.getElementById('candidateBtn');
    const recruiterBtn = document.getElementById('recruiterBtn');
    const statusMsg = document.getElementById('statusMsg');
    const backendUrl = "http://localhost:5000/api/auth/login";

    // Role selection
    candidateBtn.addEventListener('click', () => {
      selectedRole = 'candidate';
      candidateBtn.classList.add('border-indigo-500', 'bg-indigo-50');
      recruiterBtn.classList.remove('border-indigo-500', 'bg-indigo-50');
    });
    recruiterBtn.addEventListener('click', () => {
      selectedRole = 'recruiter';
      recruiterBtn.classList.add('border-indigo-500', 'bg-indigo-50');
      candidateBtn.classList.remove('border-indigo-500', 'bg-indigo-50');
    });

    const showMessage = (message, type) => {
      statusMsg.textContent = message;
      statusMsg.classList.remove('hidden', 'text-green-600', 'text-red-600');
      statusMsg.classList.add(type === 'success' ? 'text-green-600' : 'text-red-600');
    };

    // Login Form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!selectedRole) return showMessage('Please select your role first!', 'error');

      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch(backendUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, role: selectedRole })
        });
        const data = await response.json();

        if (response.ok) {
          // Store auth + user profile
          localStorage.setItem("token", data.token);
          localStorage.setItem("role", selectedRole);
          localStorage.setItem("username", data?.user?.name || fullName);
          localStorage.setItem("userEmail", data?.user?.email || email);
          localStorage.setItem("profilePic", data?.user?.profilePic || "");
          localStorage.setItem("profilePicUrl", data?.user?.profilePicUrl || "");
          localStorage.setItem("dob", data?.user?.dob || "");
          localStorage.setItem("course", data?.user?.course || "");
          localStorage.setItem("resume", data?.user?.resume || "");
          localStorage.setItem("resumeUrl", data?.user?.resumeUrl || "");
          localStorage.setItem("companyLogo", "./assets/logo.jpg"); // default, can be updated later

          showMessage("✅ Login Successful! Redirecting...", "success");
         
          setTimeout(() => {
            if (selectedRole === "candidate") {
              window.location.href = "student-dashboard.html";
            } else {
              window.location.href = "company.html";
            }
          }, 1000);
        } else {
          showMessage(data.message || "Invalid credentials. Please try again.", "error");
        }
      } catch (err) {
        showMessage("⚠️ Unable to connect to server. Try again later.", "error");
      }
    });

    // Forgot Password Modal
    const modal = document.getElementById('forgotPasswordModal');
    const forgotLink = document.getElementById('forgotPasswordLink');
    const cancelReset = document.getElementById('cancelReset');
    const sendReset = document.getElementById('sendReset');
    const resetMsg = document.getElementById('resetMsg');
    const resetLink = document.getElementById('resetLink');

    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      modal.classList.remove('hidden');
    });
    cancelReset.addEventListener('click', () => {
      modal.classList.add('hidden');
      resetMsg.classList.add('hidden');
      resetLink.classList.add('hidden');
      resetLink.removeAttribute('href');
      resetLink.textContent = '';
    });

    sendReset.addEventListener('click', async () => {
      const email = document.getElementById('resetEmail').value;
      if (!email) return;
      resetMsg.textContent = "Sending reset link...";
      resetMsg.classList.remove('hidden', 'text-green-600', 'text-red-600');
      resetMsg.classList.add('text-gray-500');
      resetLink.classList.add('hidden');
      resetLink.removeAttribute('href');
      resetLink.textContent = '';

      try {
        const res = await fetch("http://localhost:5000/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (res.ok) {
          resetMsg.textContent = "✅ Reset link sent to your email!";
          resetMsg.classList.remove('text-gray-500');
          resetMsg.classList.add('text-green-600');
          if (data.resetUrl) {
            resetMsg.textContent = "Reset link generated. Click below to set a new password.";
            resetLink.href = data.resetUrl;
            resetLink.textContent = data.resetUrl;
            resetLink.classList.remove('hidden');
          }
        } else {
          resetMsg.textContent = "❌ " + (data.message || "Failed to send link.");
          resetMsg.classList.remove('text-gray-500');
          resetMsg.classList.add('text-red-600');
        }
      } catch {
        resetMsg.textContent = "⚠️ Server error. Try again.";
        resetMsg.classList.remove('text-gray-500');
        resetMsg.classList.add('text-red-600');
      }
    });
    
  </script>
</body>
</html>
