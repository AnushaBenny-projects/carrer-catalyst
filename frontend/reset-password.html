<!DOCTYPE html>
<!-- Purpose: Renders the reset-password page for the Career Catalyst frontend. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Catalyst | Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 overflow-x-hidden">
  <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-8 border border-gray-100">
    <h1 class="text-2xl font-semibold text-gray-900 mb-2">Set a new password</h1>
    <p class="text-sm text-gray-500 mb-6">Enter your new password to continue.</p>

    <form id="resetForm" class="space-y-4">
      <input
        type="password"
        id="newPassword"
        placeholder="New password"
        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none"
        required
        minlength="6"
      />
      <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm new password"
        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none"
        required
        minlength="6"
      />

      <p id="statusMsg" class="text-sm font-medium hidden"></p>

      <button
        type="submit"
        class="w-full bg-gradient-to-r from-indigo-500 to-blue-600 hover:from-blue-600 hover:to-indigo-500 text-white font-semibold py-3 rounded-lg shadow-md transition"
      >
        Reset Password
      </button>
    </form>

    <a href="login.html" class="block mt-4 text-sm text-indigo-600 hover:underline text-center">Back to login</a>
  </div>

  <script>
    const statusMsg = document.getElementById("statusMsg");
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    const showStatus = (message, type) => {
      statusMsg.textContent = message;
      statusMsg.classList.remove("hidden", "text-green-600", "text-red-600");
      statusMsg.classList.add(type === "success" ? "text-green-600" : "text-red-600");
    };

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!token) {
        showStatus("Invalid reset link. Please request a new one.", "error");
        return;
      }

      const password = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password.length < 6) {
        showStatus("Password must be at least 6 characters.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showStatus("Passwords do not match.", "error");
        return;
      }

      try {
        const res = await fetch("http://localhost:5000/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showStatus(data.message || "Could not reset password.", "error");
          return;
        }

        showStatus("Password reset successful. Redirecting to login...", "success");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1200);
      } catch (_err) {
        showStatus("Server error. Please try again.", "error");
      }
    });
  </script>
</body>
</html>
