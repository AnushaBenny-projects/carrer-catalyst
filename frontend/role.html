<!DOCTYPE html>
<!-- Purpose: Renders the role page for the Career Catalyst frontend. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Catalyst | Select Role</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex justify-center items-center min-h-screen px-4 overflow-x-hidden">

  <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl p-8 space-y-6 border border-gray-100">

    <!-- Logo -->
    <div class="flex justify-center mb-4">
      <img src="./assets/CareerCatalyst.png"alt="Career Catalyst Logo" class="w-48 h-auto">
    </div>

    <h2 class="text-3xl font-bold text-center text-gray-800">Create your account</h2>
    <p class="text-center text-gray-500 mb-6">Join Career Catalyst to connect with opportunities 🚀</p>

    <!-- Role Selection -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">I am a *</label>
      <div class="grid grid-cols-2 gap-4">

        <!-- Candidate Button -->
        <button id="candidateBtn"
          class="flex flex-col items-center justify-center border border-gray-300 rounded-xl py-4 hover:border-indigo-500 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 mb-2 text-indigo-600" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
          </svg>
          <span class="font-medium text-gray-700">Candidate</span>
          <p class="text-xs text-gray-500">Looking for opportunities</p>
        </button>

        <!-- Recruiter Button -->
        <button id="recruiterBtn"
          class="flex flex-col items-center justify-center border border-gray-300 rounded-xl py-4 hover:border-indigo-500 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 mb-2 text-indigo-600" fill="currentColor" viewBox="0 0 24 24">
            <path d="M3 3v18h18V3H3zm2 2h14v14H5V5zm2 2v2h2V7H7zm0 4v2h2v-2H7zm0 4v2h2v-2H7zm4-8v2h2V7h-2zm0 4v2h2v-2h-2zm0 4v2h2v-2h-2zm4-8v2h2V7h-2zm0 4v2h2v-2h-2zm0 4v2h2v-2h-2z"/>
          </svg>
          <span class="font-medium text-gray-700">Recruiter</span>
          <p class="text-xs text-gray-500">Hiring talent</p>
        </button>
      </div>
    </div>

  </div>

  <script>
    // Get button references
    const candidateBtn = document.getElementById('candidateBtn');
    const recruiterBtn = document.getElementById('recruiterBtn');

    // When user selects Candidate
    candidateBtn.addEventListener('click', () => {
      localStorage.setItem('userRole', 'student'); // store role in localStorage
      window.location.href = 'student.html'; // go to student signup
    });

    // When user selects Recruiter
    recruiterBtn.addEventListener('click', () => {
      localStorage.setItem('userRole', 'recruiter');
      window.location.href = 'recruiter.html'; // go to recruiter signup
    });
  </script>

</body>
</html>
